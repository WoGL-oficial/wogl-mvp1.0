<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000000;
  --ink: #f8f0e8;
  --red: #ff2d4f;
  --green: #39ff7f;
  --ink-faint: #6a6470;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); min-height: 100vh; }
body { font-family: 'JetBrains Mono', monospace; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

.variant-nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px;
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(57,255,127,0.35);
  border-radius: 999px; padding: 4px; z-index: 100; backdrop-filter: blur(8px);
  opacity: 0;
  transition: opacity .6s ease 2s;
}
.variant-nav.ready { opacity: 1; }
.variant-nav a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
  color: var(--ink-faint); text-decoration: none;
  padding: 8px 14px; border-radius: 999px; transition: all .2s;
}
.variant-nav a.active { color: var(--green); background: rgba(57,255,127,0.12); }
.variant-nav a:hover:not(.active) { color: var(--ink); }

.stage {
  min-height: 100vh; position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

/* Black-out overlay — covers everything for 1.5s, then fades */
.blackout {
  position: fixed; inset: 0;
  background: #000;
  z-index: 1000;
  opacity: 1;
  pointer-events: none;
  transition: opacity .25s ease;
}
.blackout.gone { opacity: 0; }

/* Power-on flash — bright green sliver crossing the screen */
.power-flash {
  position: fixed; inset: 0;
  z-index: 999;
  pointer-events: none;
  background: linear-gradient(180deg,
    transparent 0%, transparent 49%,
    rgba(57,255,127,0.85) 50%,
    transparent 51%, transparent 100%);
  background-size: 100% 4px;
  background-position: 0 -8px;
  opacity: 0;
}
.power-flash.zap {
  animation: zap-cross 0.5s ease-out forwards;
}
@keyframes zap-cross {
  0%   { opacity: 0; background-position: 0 -8px; }
  20%  { opacity: 1; background-position: 0 25vh; }
  60%  { opacity: 1; background-position: 0 75vh; }
  100% { opacity: 0; background-position: 0 110vh; }
}

/* The massive typewriter title */
.terminal-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: clamp(40px, 10vw, 120px);
  letter-spacing: -0.04em;
  line-height: 0.95;
  color: var(--green);
  text-align: center;
  text-shadow:
    0 0 30px rgba(57,255,127,0.55),
    0 0 80px rgba(57,255,127,0.30),
    0 0 160px rgba(57,255,127,0.15);
  word-break: break-word;
  max-width: 100%;
  padding: 0 12px;
}
.terminal-title .caret {
  display: inline-block;
  width: 0.45em;
  height: 0.85em;
  background: var(--green);
  margin-left: 0.08em;
  vertical-align: -0.05em;
  box-shadow: 0 0 20px rgba(57,255,127,0.95);
  animation: tc-blink 1s steps(2, end) infinite;
}
@keyframes tc-blink {
  0%, 49%  { opacity: 1; }
  50%,100% { opacity: 0; }
}

/* Subtle scanlines + vignette for CRT feel */
.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 50;
  background-image: repeating-linear-gradient(
    0deg, rgba(57,255,127,0.030) 0px, rgba(57,255,127,0.030) 1px,
    transparent 1px, transparent 3px
  );
  mix-blend-mode: overlay;
  opacity: 0;
  transition: opacity .8s ease;
}
.scanlines.on { opacity: 1; }
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 40;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
  opacity: 0;
  transition: opacity .8s ease;
}
.vignette.on { opacity: 1; }

.replay {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--green); background: rgba(0,0,0,0.85);
  border: 1px solid rgba(57,255,127,0.45); border-radius: 4px;
  padding: 12px 22px; cursor: pointer; z-index: 100;
  opacity: 0;
  transition: opacity .6s ease 2s, background .2s, box-shadow .2s;
}
.replay.ready { opacity: 1; }
.replay:hover { background: rgba(57,255,127,0.10); box-shadow: 0 0 22px rgba(57,255,127,0.35); }
</style>
</head>
<body>

<div class="blackout" id="blackout"></div>
<div class="power-flash" id="powerFlash"></div>

<nav class="variant-nav" id="variantNav">
  <a href="intro-a.html">A</a>
  <a href="intro-b.html">B</a>
  <a href="intro-c1.html" class="active">C1</a>
  <a href="intro-c2.html">C2</a>
  <a href="intro-d1.html">D1</a>
  <a href="intro-d2.html">D2</a>
</nav>

<div class="stage">
  <h1 class="terminal-title" id="title"><span class="caret"></span></h1>
</div>

<div class="scanlines" id="scanlines"></div>
<div class="vignette" id="vignette"></div>
<button class="replay" id="replay" onclick="location.reload()">↻ Replay</button>

<script>
/* Phase 1: 1500ms of full black (screen "off")
   Phase 2: 500ms power-on flash crossing the screen
   Phase 3: typewriter prints "WELCOME TO THE TERMINAL" letter by letter */
var text = 'WELCOME TO THE TERMINAL';
var title = document.getElementById('title');
var caret = title.querySelector('.caret');

setTimeout(function() {
  /* Power-on zap */
  document.getElementById('powerFlash').classList.add('zap');
}, 1300);

setTimeout(function() {
  /* Screen turns on — fade blackout, enable scanlines + vignette */
  document.getElementById('blackout').classList.add('gone');
  document.getElementById('scanlines').classList.add('on');
  document.getElementById('vignette').classList.add('on');
}, 1600);

setTimeout(function() {
  /* Start typewriter */
  var i = 0;
  function tick() {
    if (i >= text.length) return;
    var ch = text.charAt(i);
    title.insertBefore(document.createTextNode(ch), caret);
    i++;
    var delay = 75;
    if (ch === ' ') delay = 180;
    setTimeout(tick, delay);
  }
  tick();
  document.getElementById('variantNav').classList.add('ready');
  document.getElementById('replay').classList.add('ready');
}, 2200);
</script>

</body>
</html>
