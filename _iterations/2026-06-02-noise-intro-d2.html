body { font-family: 'Outfit', sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }

<div class="stage">
  <canvas id="matrixCanvas"></canvas>
  <div class="eyebrow" id="eyebrow">Noise · 01</div>
  <div class="sub" id="sub">structure from randomness</div>
</div>

<button class="replay" onclick="location.reload()">↻ Replay</button>

<script>
/* ─── Matrix rain that crystallizes into "EL RUIDO" ───
   Phase 1 (0-2500ms): rain normal
   Phase 2 (2500-3600ms): drops landing inside the title mask freeze
   in place glowing bright. The mask is a hidden canvas with
   "EL RUIDO" painted; we sample pixels per grid cell.
   Phase 3 (3600ms+): full title formed of frozen droplets,
   background rain keeps falling. */

var canvas = document.getElementById('matrixCanvas');
var ctx = canvas.getContext('2d');
var dpr = Math.min(window.devicePixelRatio || 1, 2);

var glyphs = 'アァカサタナハマヤラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨロヲゴゾドボポ0123456789ABCDEF';
function rand(n) { return Math.floor(Math.random() * n); }
function randGlyph() { return glyphs.charAt(rand(glyphs.length)); }

var fontSize = 16;
var cols = 0, rows = 0, drops = [];
var titleMask = null;           /* 2D boolean grid: titleMask[col][row] */
var frozen = [];                /* array of {col, row, ch} */
var maskComputed = false;

function resize() {
  var w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  fontSize = Math.max(14, Math.floor(w / 80));
  cols = Math.floor(w / fontSize);
  rows = Math.floor(h / fontSize);
  drops = [];
  for (var i = 0; i < cols; i++) drops[i] = Math.random() * -h / fontSize;
  computeMask();
}
window.addEventListener('resize', resize);

function computeMask() {
  /* Paint "EL RUIDO" in an offscreen canvas, read pixel data,
     then bucket into the grid cells (col, row). */
  var w = window.innerWidth, h = window.innerHeight;
  var off = document.createElement('canvas');
  off.width = w; off.height = h;
  var octx = off.getContext('2d');
  octx.fillStyle = '#000';
  octx.fillRect(0, 0, w, h);

  /* Title size scales with viewport. */
  var titleSize = Math.floor(Math.min(w, h) * 0.20);
  octx.font = '900 ' + titleSize + 'px Outfit, sans-serif';
  octx.fillStyle = '#fff';
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  octx.fillText('EL RUIDO', w / 2, h / 2);

  var imgData = octx.getImageData(0, 0, w, h).data;
  titleMask = [];
  for (var c = 0; c < cols; c++) {
    titleMask[c] = [];
    for (var r = 0; r < rows; r++) {
      /* Sample center of the cell. */
      var sx = Math.floor(c * fontSize + fontSize / 2);
      var sy = Math.floor(r * fontSize + fontSize / 2);
      if (sx < 0 || sx >= w || sy < 0 || sy >= h) {
        titleMask[c][r] = false; continue;
      }
      var idx = (sy * w + sx) * 4;
      /* Red channel > 128 means it's inside a letter. */
      titleMask[c][r] = imgData[idx] > 128;
    }
  }
  maskComputed = true;
}
resize();

/* Phase scheduler */
var t0 = performance.now();
var crystallizeStart = 2500;
var crystallizeEnd = 3600;

function draw(now) {
  requestAnimationFrame(draw);
  var elapsed = now - t0;

  /* Trail fade — slightly stronger so frozen cells pop. */
  ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  ctx.font = '500 ' + fontSize + 'px JetBrains Mono, monospace';
  ctx.textBaseline = 'top';

  /* Standard rain — but if a drop lands inside a mask cell during
     the crystallize window, it freezes there. */
  for (var i = 0; i < cols; i++) {
    var row = Math.floor(drops[i]);
    var x = i * fontSize;
    var y = row * fontSize;
    var ch = randGlyph();

    /* Capture freezing */
    if (
      elapsed >= crystallizeStart &&
      elapsed <= crystallizeEnd &&
      maskComputed &&
      row >= 0 && row < rows &&
      titleMask[i] && titleMask[i][row]
    ) {
      /* Roll-in by horizontal phase: cells closer to the center
         freeze first. Progress is 0..1 across the window. */
      var phase = (elapsed - crystallizeStart) / (crystallizeEnd - crystallizeStart);
      var centerDist = Math.abs(i - cols / 2) / (cols / 2);
      if (phase >= centerDist * 0.9) {
        frozen.push({ col: i, row: row, ch: randGlyph(), bornAt: elapsed });
        drops[i] = Math.random() * -window.innerHeight / fontSize;  /* respawn column */
        continue;
      }
    }

    /* Normal rain head */
    ctx.fillStyle = '#caffd9';
    ctx.shadowBlur = 14;
    ctx.shadowColor = 'rgba(57,255,127,0.85)';
    ctx.fillText(ch, x, y);
    ctx.shadowBlur = 0;

    if (drops[i] > 1) {
      ctx.fillStyle = 'rgba(57, 255, 127, 0.55)';
      ctx.fillText(randGlyph(), x, y - fontSize);
    }
    drops[i]++;
    if (y > window.innerHeight && Math.random() > 0.975) drops[i] = 0;
  }

  /* Once the crystallize window ends, force-freeze any remaining
     mask cells so the title is complete even if some columns missed. */
  if (elapsed > crystallizeEnd && frozen._completed !== true) {
    for (var c = 0; c < cols; c++) {
      for (var r = 0; r < rows; r++) {
        if (titleMask[c] && titleMask[c][r]) {
          var already = false;
          for (var k = 0; k < frozen.length; k++) {
            if (frozen[k].col === c && frozen[k].row === r) { already = true; break; }
          }
          if (!already) frozen.push({ col: c, row: r, ch: randGlyph(), bornAt: elapsed });
        }
      }
    }
    frozen._completed = true;
    document.getElementById('eyebrow').classList.add('tuned');
    document.getElementById('sub').classList.add('tuned');
  }

  /* Render frozen droplets — bright white-green with strong glow.
     Subtle flicker over time for a living crystal feel. */
  for (var f = 0; f < frozen.length; f++) {
    var fc = frozen[f];
    var age = elapsed - fc.bornAt;
    /* Spawn pulse: bright burst for the first 200ms after freezing. */
    var pulse = age < 200 ? 1.0 - age / 200 : 0;
    var flickerAlpha = 0.94 + 0.06 * Math.sin(elapsed * 0.006 + f * 0.7);
    ctx.fillStyle = 'rgba(220, 255, 230, ' + flickerAlpha.toFixed(3) + ')';
    ctx.shadowBlur = 18 + pulse * 18;
    ctx.shadowColor = 'rgba(57,255,127,' + (0.95 + pulse * 0.05) + ')';
    ctx.fillText(fc.ch, fc.col * fontSize, fc.row * fontSize);
    ctx.shadowBlur = 0;
    /* Occasionally regenerate the char for a flickering Matrix vibe. */
    if (Math.random() < 0.012) fc.ch = randGlyph();
  }
}
requestAnimationFrame(draw);
</script>
